<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Portal | One Leyte</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#08110c;
}

.portal-section{
  padding:80px 20px;
  text-align:center;
}

.portal-box{
  max-width:520px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.portal-box h2{
  margin-bottom:10px;
  color:#102118;
}

.portal-box p{
  margin-bottom:25px;
  color:#555;
  line-height:1.6;
}

.portal-box input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:16px;
  box-sizing:border-box;
}

.portal-btn{
  width:100%;
  padding:12px;
  background:#0a6b3f;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  font-weight:600;
}

.portal-btn:hover{
  background:#084e2f;
}

.portal-message{
  margin-top:15px;
  font-size:14px;
  min-height:24px;
  color:#333;
}

.back-home{
  margin-top:20px;
  display:inline-block;
  color:#0a6b3f;
  text-decoration:none;
  font-weight:600;
}

.portal-actions{
  display:none;
  margin-top:25px;
  text-align:left;
}

.portal-welcome{
  background:#f6faf7;
  border:1px solid #d9e6dd;
  border-radius:10px;
  padding:16px;
  margin-bottom:18px;
}

.portal-welcome strong{
  display:block;
  font-size:20px;
  color:#102118;
  margin-bottom:8px;
}

.portal-welcome span{
  display:block;
  color:#555;
  font-size:14px;
  margin-top:4px;
}

.action-links{
  display:grid;
  gap:12px;
}

.action-link{
  display:block;
  text-align:center;
  padding:13px 16px;
  background:#0a6b3f;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:600;
}

.action-link:hover{
  background:#084e2f;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<section class="portal-section">

  <div class="portal-box">

    <h2>Member Portal</h2>

    <p id="portalIntro">
      Scan your QR code or enter your Member ID and Full Name to access posting options.
    </p>

    <div id="manualForm">
      <input id="memberId" type="text" placeholder="Member ID (Example: OLR8-000001)">
      <input id="fullName" type="text" placeholder="Full Name">
      <button class="portal-btn" onclick="verifyMember()">Access Portal</button>
    </div>

    <div id="message" class="portal-message"></div>

    <div id="portalActions" class="portal-actions">
      <div class="portal-welcome">
        <strong id="welcomeName">Welcome</strong>
        <span><b>Member ID:</b> <span id="welcomeMemberId"></span></span>
      </div>

      <div class="action-links">
        <a id="freedomWallLink" class="action-link" href="#">Post on Freedom Wall</a>
        <a id="mediaUploadsLink" class="action-link" href="#">Upload Media</a>
      </div>
    </div>

    <a class="back-home" href="index.html">Return to Homepage</a>

  </div>

</section>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec";

const memberIdInput = document.getElementById("memberId");
const fullNameInput = document.getElementById("fullName");
const messageBox = document.getElementById("message");
const manualForm = document.getElementById("manualForm");
const portalActions = document.getElementById("portalActions");
const welcomeName = document.getElementById("welcomeName");
const welcomeMemberId = document.getElementById("welcomeMemberId");
const freedomWallLink = document.getElementById("freedomWallLink");
const mediaUploadsLink = document.getElementById("mediaUploadsLink");

(function initPortalAccess() {
  const params = new URLSearchParams(window.location.search);
  const memberIdFromUrl = (params.get("memberId") || params.get("MemberID") || "").trim();

  if (memberIdFromUrl) {
    memberIdInput.value = memberIdFromUrl;
    autoAccessWithMemberId(memberIdFromUrl);
  }
})();

async function autoAccessWithMemberId(memberId) {
  messageBox.innerHTML = "Verifying QR access...";

  try {
    const response = await fetch(
      API_URL + "?action=getmembername&memberId=" + encodeURIComponent(memberId)
    );

    const data = await response.json();

    if (data.success) {
      const resolvedName = data.memberName || data.fullName || data.name || "Member";
      showPortalActions(memberId, resolvedName);
      messageBox.innerHTML = "QR verified successfully.";
    } else {
      messageBox.innerHTML = data.message || "Unable to verify QR access.";
    }

  } catch (error) {
    console.error(error);
    messageBox.innerHTML = "Unable to verify QR access right now.";
  }
}

async function verifyMember() {
  const memberId = memberIdInput.value.trim();
  const fullName = fullNameInput.value.trim().toLowerCase();

  if (!memberId || !fullName) {
    messageBox.innerHTML = "Please enter Member ID and Full Name.";
    return;
  }

  messageBox.innerHTML = "Verifying membership...";

  try {
    const response = await fetch(
      API_URL + "?action=getmembername&memberId=" + encodeURIComponent(memberId)
    );

    const data = await response.json();

    if (!data.success) {
      messageBox.innerHTML = data.message || "Member not found.";
      return;
    }

    const resolvedName = String(data.memberName || data.fullName || data.name || "").trim();

    if (!resolvedName) {
      messageBox.innerHTML = "Member name could not be resolved.";
      return;
    }

    if (resolvedName.toLowerCase() !== fullName) {
      messageBox.innerHTML = "Full Name does not match this Member ID.";
      return;
    }

    messageBox.innerHTML = "Welcome " + resolvedName + ". Opening portal...";
    showPortalActions(memberId, resolvedName);

  } catch (error) {
    console.error(error);
    messageBox.innerHTML = "Unable to verify membership.";
  }
}

function showPortalActions(memberId, memberName) {
  manualForm.classList.add("hidden");
  portalActions.style.display = "block";

  welcomeName.textContent = "Welcome, " + memberName;
  welcomeMemberId.textContent = memberId;

  freedomWallLink.href = "freedom-wall.html?memberId=" + encodeURIComponent(memberId);
  mediaUploadsLink.href = "media-uploads.html?memberId=" + encodeURIComponent(memberId);
}
</script>

</body>
</html>
