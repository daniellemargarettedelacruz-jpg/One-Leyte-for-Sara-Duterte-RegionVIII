<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freedom Wall | One Leyte</title>

<link rel="stylesheet" href="style.css">

<style>

.page-header{
text-align:center;
padding:70px 20px 40px 20px;
background:#08110c;
color:white;
}

.page-header h1{
font-size:34px;
margin-bottom:10px;
}

.page-header p{
color:#cfd7d2;
max-width:700px;
margin:auto;
}

.freedom-container{
padding:60px 20px;
background:#eef1ed;
}

.freedom-feed{
max-width:720px;
margin:auto;
display:flex;
flex-direction:column;
gap:22px;
}

.freedom-post{
background:white;
border-radius:12px;
padding:22px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border-left:4px solid #0a6b3f;
}

.post-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:10px;
}

.post-avatar{
width:38px;
height:38px;
border-radius:50%;
background:#0a6b3f;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:700;
font-size:16px;
flex-shrink:0;
}

.post-name{
font-weight:700;
color:#0a6b3f;
}

.post-location{
font-size:12px;
color:#888;
}

.post-message{
margin-top:10px;
color:#333;
line-height:1.6;
white-space:pre-wrap;
}

.submit-section{
text-align:center;
padding:50px 20px;
background:white;
}

.submit-section h3{
color:#102118;
margin-bottom:8px;
}

.submit-section p{
color:#555;
}

.submit-btn{
display:inline-block;
padding:14px 26px;
background:#0a6b3f;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

.submit-btn:hover{
background:#084c2c;
}

.empty-message{
text-align:center;
color:#666;
padding:30px 20px;
}

</style>

</head>

<body>

<section class="page-header">

<h1>Freedom Wall</h1>

<p>
Messages of support from members of the movement across Region VIII.
All posts are reviewed before being displayed publicly.
</p>

</section>


<section class="freedom-container">

<div class="freedom-feed" id="freedomWall">

<div class="empty-message">Loading messages...</div>

</div>

</section>


<section class="submit-section">

<h3>Share Your Message</h3>

<p>Members can post messages of support and solidarity.</p>

<br>

<a href="member-portal-access.html?next=freedom-wall-submit.html" class="submit-btn">
Post Your Message
</a>

</section>


<script>

const api = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec?action=freedomwall";

fetch(api)
.then(res => res.json())
.then(data => {

const container = document.getElementById("freedomWall");
container.innerHTML = "";

if (!data.items || data.items.length === 0) {
  container.innerHTML = '<div class="empty-message">No approved messages yet.</div>';
  return;
}

data.items.forEach(item => {

const card = document.createElement("div");
card.className = "freedom-post";

const fullName = item.FullName || "Anonymous Member";
const municipality = item.Municipality || "Region VIII";
const message = item.Message || "";
const firstLetter = fullName.trim().charAt(0).toUpperCase();

card.innerHTML = `
<div class="post-header">
  <div class="post-avatar">${firstLetter}</div>
  <div>
    <div class="post-name">${fullName}</div>
    <div class="post-location">${municipality}</div>
  </div>
</div>

<div class="post-message">${message}</div>
`;

container.appendChild(card);

});

})
.catch(error => {
  const container = document.getElementById("freedomWall");
  container.innerHTML = '<div class="empty-message">Unable to load Freedom Wall posts right now.</div>';
  console.error(error);
});

</script>

</body>
</html>
