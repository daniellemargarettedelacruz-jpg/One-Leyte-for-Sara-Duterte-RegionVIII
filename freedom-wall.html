<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Freedom Wall | One Leyte</title>

<link rel="stylesheet" href="style.css">

<style>

.page-header{
text-align:center;
padding:70px 20px 40px 20px;
background:#08110c;
color:white;
}

.page-header h1{
font-size:34px;
margin-bottom:10px;
}

.page-header p{
color:#cfd7d2;
max-width:700px;
margin:auto;
}

.freedom-container{
padding:60px 20px;
background:#eef1ed;
}

.freedom-feed{
max-width:720px;
margin:auto;
display:flex;
flex-direction:column;
gap:22px;
}

.freedom-post{
background:white;
border-radius:12px;
padding:22px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border-left:4px solid #0a6b3f;
}

.post-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:10px;
}

.post-avatar{
width:38px;
height:38px;
border-radius:50%;
background:#0a6b3f;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:700;
font-size:16px;
flex-shrink:0;
}

.post-name{
font-weight:700;
color:#0a6b3f;
}

.post-message{
margin-top:10px;
color:#333;
line-height:1.6;
white-space:pre-wrap;
}

.submit-section{
text-align:center;
padding:50px 20px;
background:white;
}

.submit-section h3{
color:#102118;
margin-bottom:8px;
}

.submit-section p{
color:#555;
}

.empty-message{
text-align:center;
color:#666;
padding:30px 20px;
}

.wall-form{
max-width:650px;
margin:30px auto 0 auto;
text-align:left;
background:#f8faf8;
padding:24px;
border-radius:14px;
box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

.wall-form input,
.wall-form textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #cfd7d2;
border-radius:8px;
box-sizing:border-box;
font-size:14px;
color:#111;
background:#fff;
}

.wall-form textarea{
min-height:140px;
resize:vertical;
}

.wall-form label{
display:block;
font-weight:600;
color:#183325;
}

.wall-form .checkbox-wrap{
display:flex;
gap:10px;
align-items:flex-start;
margin-bottom:18px;
}

.wall-form .checkbox-wrap input{
width:auto;
margin-top:2px;
margin-bottom:0;
}

.wall-form button{
padding:12px 22px;
background:#0a6b3f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.wall-form button:hover{
background:#084c2c;
}

.wall-form button:disabled{
background:#7aa892;
cursor:not-allowed;
}

.wall-status{
margin-top:15px;
font-weight:600;
min-height:24px;
color:#111;
}

</style>

</head>

<body>

<section class="page-header">

<h1>Freedom Wall</h1>

<p>
Messages of support from members of the movement across Region VIII.
All posts are reviewed before being displayed publicly.
</p>

</section>


<section class="freedom-container">

<div class="freedom-feed" id="freedomWall">
<div class="empty-message">Loading messages...</div>
</div>

</section>


<section class="submit-section">

<h3>Share Your Message</h3>

<p>Members may post their message of support using MemberID or QR access.</p>

<div class="wall-form">

<label for="memberId">Member ID</label>
<input type="text" id="memberId" placeholder="Enter your MemberID">

<label for="fullName">Full Name</label>
<input type="text" id="fullName" placeholder="Enter your full name">

<label for="message">Your Message</label>
<textarea id="message" placeholder="Write your message here..."></textarea>

<label class="checkbox-wrap">
<input type="checkbox" id="consent">
<span>I confirm that this message is submitted voluntarily and may be reviewed before public posting.</span>
</label>

<button type="button" id="wallSubmitBtn" onclick="submitFreedomWall()">Submit Message</button>

<div id="wallStatus" class="wall-status"></div>

</div>

</section>


<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec";

const api = WEB_APP_URL + "?action=freedomwall";

fetch(api)
.then(res => res.json())
.then(data => {

const container = document.getElementById("freedomWall");
container.innerHTML = "";

if (!data.items || data.items.length === 0) {
  container.innerHTML = '<div class="empty-message">No approved messages yet.</div>';
  return;
}

data.items.forEach(item => {

const card = document.createElement("div");
card.className = "freedom-post";

const fullName = item.FullName || "Anonymous Member";
const message = item.Message || "";
const firstLetter = fullName.trim().charAt(0).toUpperCase();

card.innerHTML = `
<div class="post-header">
  <div class="post-avatar">${firstLetter}</div>
  <div>
    <div class="post-name">${fullName}</div>
  </div>
</div>

<div class="post-message">${message}</div>
`;

container.appendChild(card);

});

})
.catch(error => {
  const container = document.getElementById("freedomWall");
  container.innerHTML = '<div class="empty-message">Unable to load Freedom Wall posts right now.</div>';
  console.error(error);
});


// QR / URL MemberID autofill
(function autofillMemberIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  const memberId = (params.get("memberId") || "").trim();
  if (memberId) {
    document.getElementById("memberId").value = memberId;
  }
})();

async function submitFreedomWall() {
  const status = document.getElementById("wallStatus");
  const button = document.getElementById("wallSubmitBtn");

  const memberId = document.getElementById("memberId").value.trim();
  const fullName = document.getElementById("fullName").value.trim();
  const message = document.getElementById("message").value.trim();
  const consent = document.getElementById("consent").checked;

  status.style.color = "#111";

  if (!memberId || !fullName || !message) {
    status.innerText = "Please complete all required fields.";
    status.style.color = "red";
    return;
  }

  if (!consent) {
    status.innerText = "Please confirm the consent checkbox.";
    status.style.color = "red";
    return;
  }

  button.disabled = true;
  button.innerText = "Submitting...";
  status.innerText = "Submitting...";
  status.style.color = "#111";

  try {
    const payload = {
      action: "submitfreedomwall",
      memberId: memberId,
      fullName: fullName,
      message: message,
      consent: "Yes"
    };

    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.success) {
      status.innerText = "Message submitted successfully. Waiting for admin approval.";
      status.style.color = "green";

      document.getElementById("fullName").value = "";
      document.getElementById("message").value = "";
      document.getElementById("consent").checked = false;
    } else {
      status.innerText = result.message || "Submission failed.";
      status.style.color = "red";
    }

  } catch (err) {
    status.innerText = "Submission failed. Please try again.";
    status.style.color = "red";
    console.error(err);
  }

  button.disabled = false;
  button.innerText = "Submit Message";
}

</script>

</body>
</html>
