<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Media Uploads | One Leyte</title>

<link rel="stylesheet" href="style.css">

<style>

.page-header{
text-align:center;
padding:70px 20px 40px 20px;
background:#08110c;
color:white;
}

.page-header h1{
font-size:34px;
margin-bottom:10px;
}

.page-header p{
max-width:700px;
margin:auto;
color:#cfd7d2;
}

.media-container{
padding:60px 20px;
background:#f4f4f4;
}

.media-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.media-card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
}

.media-thumb{
width:100%;
height:240px;
background:#e9ece8;
overflow:hidden;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.media-thumb img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.media-caption{
padding:16px;
font-size:14px;
color:#333;
}

.media-caption strong{
display:block;
margin-bottom:6px;
font-size:18px;
color:#111;
}

.media-loadmore-wrap{
text-align:center;
margin-top:30px;
}

.media-loadmore-btn{
padding:12px 22px;
background:#0a6b3f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.media-loadmore-btn:hover{
background:#084c2c;
}

.submit-section{
text-align:center;
padding:50px 20px;
background:white;
}

.submit-btn{
display:inline-block;
padding:14px 26px;
background:#0a6b3f;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

.submit-btn:hover{
background:#084c2c;
}

.upload-form{
max-width:650px;
margin:40px auto;
text-align:left;
}

.upload-form input,
.upload-form textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
color:#111;
background:#fff;
box-sizing:border-box;
}

.upload-form input[readonly]{
background:#f2f4f2;
}

.upload-form input[type="file"]{
color:#111;
background:#fff;
}

.upload-form input[type="file"]::file-selector-button{
background:#0a6b3f;
color:#fff;
border:none;
padding:10px 14px;
border-radius:6px;
margin-right:12px;
cursor:pointer;
}

.upload-form input[type="file"]::file-selector-button:hover{
background:#084c2c;
}

.upload-form button{
padding:12px 20px;
background:#0a6b3f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.upload-form button:hover{
background:#084c2c;
}

.upload-form button:disabled{
background:#7aa892;
cursor:not-allowed;
}

.upload-status{
margin-top:15px;
font-weight:600;
color:#111;
min-height:24px;
}

.upload-form label{
display:block;
color:#333;
font-size:14px;
font-weight:600;
}

.upload-form input[type="checkbox"]{
width:auto;
margin-right:8px;
}

.checkbox-wrap{
display:flex;
gap:10px;
align-items:flex-start;
margin-bottom:18px;
}

.empty-message{
text-align:center;
color:#666;
padding:30px 20px;
max-width:900px;
margin:auto;
}

.preview-wrap{
display:none;
margin-bottom:18px;
}

.preview-wrap img{
width:100%;
max-height:320px;
object-fit:contain;
border-radius:10px;
border:1px solid #d7ddd8;
background:#fafafa;
}

.field-note{
font-size:12px;
color:#666;
margin-top:-8px;
margin-bottom:14px;
}

/* Modal */
.media-modal{
display:none;
position:fixed;
z-index:9999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.88);
padding:30px 20px;
box-sizing:border-box;
overflow:auto;
}

.media-modal-content{
max-width:1000px;
margin:40px auto;
background:#111;
border-radius:14px;
overflow:hidden;
position:relative;
}

.media-modal-close{
position:absolute;
top:12px;
right:16px;
font-size:30px;
color:white;
cursor:pointer;
z-index:2;
font-weight:bold;
}

.media-modal-image-wrap{
background:#000;
display:flex;
align-items:center;
justify-content:center;
max-height:75vh;
overflow:hidden;
}

.media-modal-image{
width:100%;
height:auto;
max-height:75vh;
object-fit:contain;
display:block;
}

.media-modal-caption{
background:white;
padding:18px;
}

.media-modal-caption strong{
display:block;
margin-bottom:8px;
font-size:18px;
color:#111;
}

@media (max-width:640px){
  .media-thumb{
    height:210px;
  }

  .page-header h1{
    font-size:28px;
  }
}

</style>

</head>

<body>

<section class="page-header">

<h1>Community Media</h1>

<p>
Photos and videos shared by members from events, gatherings,
and activities across the region.
</p>

</section>

<section class="media-container">

<div class="media-grid" id="mediaGrid">
Loading media...
</div>

<div class="media-loadmore-wrap" id="loadMoreWrap" style="display:none;">
  <button class="media-loadmore-btn" id="loadMoreBtn">Load More</button>
</div>

</section>

<section class="submit-section">

<h3>Submit Photo</h3>

<div class="upload-form">

<label for="memberId">Member ID</label>
<input type="text" id="memberId" placeholder="Enter your MemberID">
<div class="field-note">If you opened this from your QR code, MemberID may already be filled.</div>

<label for="fullName">Full Name</label>
<input type="text" id="fullName" placeholder="Full Name will appear here" readonly>

<label for="municipality">Municipality</label>
<input type="text" id="municipality" placeholder="Municipality">

<label for="caption">Caption</label>
<textarea id="caption" placeholder="Caption"></textarea>

<label for="photoFile">Choose Photo</label>
<input type="file" id="photoFile" accept="image/*" capture="environment">

<div class="preview-wrap" id="previewWrap">
  <img id="previewImage" src="" alt="Preview">
</div>

<label class="checkbox-wrap">
<input type="checkbox" id="consent">
<span>I allow One Leyte for Sara Duterte to review and publish this photo if approved.</span>
</label>

<button type="button" id="uploadBtn" onclick="uploadMedia()">Submit Photo</button>

<div id="uploadStatus" class="upload-status"></div>

</div>

</section>

<!-- Image Modal -->
<div class="media-modal" id="mediaModal">
  <div class="media-modal-content">
    <span class="media-modal-close" id="mediaModalClose">&times;</span>
    <div class="media-modal-image-wrap">
      <img id="mediaModalImage" class="media-modal-image" src="" alt="Full Media">
    </div>
    <div class="media-modal-caption">
      <strong id="mediaModalName"></strong>
      <div id="mediaModalText"></div>
    </div>
  </div>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec";
const api = WEB_APP_URL + "?action=media";

const mediaGrid = document.getElementById("mediaGrid");
const loadMoreWrap = document.getElementById("loadMoreWrap");
const loadMoreBtn = document.getElementById("loadMoreBtn");

const mediaModal = document.getElementById("mediaModal");
const mediaModalImage = document.getElementById("mediaModalImage");
const mediaModalName = document.getElementById("mediaModalName");
const mediaModalText = document.getElementById("mediaModalText");
const mediaModalClose = document.getElementById("mediaModalClose");

const memberIdInput = document.getElementById("memberId");
const fullNameInput = document.getElementById("fullName");
const photoFileInput = document.getElementById("photoFile");
const previewWrap = document.getElementById("previewWrap");
const previewImage = document.getElementById("previewImage");

let allMediaItems = [];
let visibleCount = 6;

fetch(api)
.then(res => res.json())
.then(data => {
  if (!data.items || !data.items.length) {
    mediaGrid.innerHTML = "<div class='empty-message'>No approved media yet.</div>";
    return;
  }

  allMediaItems = data.items;
  renderMediaItems();
})
.catch(() => {
  mediaGrid.innerHTML = "<div class='empty-message'>Unable to load media right now.</div>";
});

function renderMediaItems() {
  mediaGrid.innerHTML = "";

  const itemsToShow = allMediaItems.slice(0, visibleCount);

  itemsToShow.forEach(item => {
    const card = document.createElement("div");
    card.className = "media-card";

    const previewSrc = item.ThumbnailURL || item.MediaURL || "";
    const fullSrc = item.MediaURL || item.ThumbnailURL || "";
    const fullName = item.FullName || "Member";
    const caption = item.Caption || "";

    card.innerHTML = `
      <div class="media-thumb">
        <img src="${previewSrc}" alt="Community Media" loading="lazy">
      </div>
      <div class="media-caption">
        <strong>${escapeHtml(fullName)}</strong>
        ${escapeHtml(caption)}
      </div>
    `;

    const thumb = card.querySelector(".media-thumb");
    thumb.addEventListener("click", () => {
      openMediaModal(fullSrc, fullName, caption);
    });

    mediaGrid.appendChild(card);
  });

  loadMoreWrap.style.display = visibleCount < allMediaItems.length ? "block" : "none";
}

loadMoreBtn.addEventListener("click", () => {
  visibleCount += 6;
  renderMediaItems();
});

function openMediaModal(imageSrc, fullName, caption) {
  mediaModalImage.src = imageSrc;
  mediaModalName.textContent = fullName || "Member";
  mediaModalText.textContent = caption || "";
  mediaModal.style.display = "block";
}

function closeMediaModal() {
  mediaModal.style.display = "none";
  mediaModalImage.src = "";
}

mediaModalClose.addEventListener("click", closeMediaModal);
mediaModal.addEventListener("click", function(e) {
  if (e.target === mediaModal) closeMediaModal();
});

// QR / URL MemberID autofill
(function autofillMemberIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  const memberId = (params.get("memberId") || "").trim();
  if (memberId) {
    memberIdInput.value = memberId;
    resolveMemberName();
  }
})();

// Resolve full name when MemberID changes
memberIdInput.addEventListener("change", resolveMemberName);
memberIdInput.addEventListener("blur", resolveMemberName);

async function resolveMemberName() {
  const memberId = memberIdInput.value.trim();
  fullNameInput.value = "";

  if (!memberId) return;

  try {
    // reuse verifymember endpoint by passing a placeholder lastName is not ideal,
    // so backend upgrade below will make media upload resolve the name.
    // For now we only display the MemberID as entered until backend patch is added.
    // This keeps the page safe from breaking.
    fullNameInput.value = "";
  } catch (err) {
    console.error(err);
  }
}

// Preview selected image
photoFileInput.addEventListener("change", function() {
  const file = this.files[0];

  if (!file) {
    previewWrap.style.display = "none";
    previewImage.src = "";
    return;
  }

  if (!file.type.startsWith("image/")) {
    previewWrap.style.display = "none";
    previewImage.src = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    previewImage.src = e.target.result;
    previewWrap.style.display = "block";
  };
  reader.readAsDataURL(file);
});

async function uploadMedia() {
  const status = document.getElementById("uploadStatus");
  const button = document.getElementById("uploadBtn");

  const memberId = memberIdInput.value.trim();
  const municipality = document.getElementById("municipality").value.trim();
  const caption = document.getElementById("caption").value.trim();
  const consent = document.getElementById("consent").checked;
  const file = photoFileInput.files[0];

  status.style.color = "#111";

  if (!memberId || !municipality || !caption) {
    status.innerText = "Please fill all required fields.";
    status.style.color = "red";
    return;
  }

  if (!file) {
    status.innerText = "Please choose a photo.";
    status.style.color = "red";
    return;
  }

  if (!consent) {
    status.innerText = "Please check the consent box.";
    status.style.color = "red";
    return;
  }

  if (!file.type.startsWith("image/")) {
    status.innerText = "Only image files are allowed.";
    status.style.color = "red";
    return;
  }

  const maxSize = 5 * 1024 * 1024;
  if (file.size > maxSize) {
    status.innerText = "Image too large. Please upload a file below 5MB.";
    status.style.color = "red";
    return;
  }

  button.disabled = true;
  button.innerText = "Uploading...";
  status.innerText = "Uploading photo. Please wait...";
  status.style.color = "#111";

  try {
    const base64 = await fileToBase64(file);

    const payload = {
      action: "uploadmedia",
      memberId: memberId,
      municipality: municipality,
      caption: caption,
      consent: "Yes",
      fileName: file.name,
      mimeType: file.type,
      base64Data: base64
    };

    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.success) {
      status.innerText = "Upload successful. Waiting for admin approval.";
      status.style.color = "green";

      document.getElementById("municipality").value = "";
      document.getElementById("caption").value = "";
      photoFileInput.value = "";
      document.getElementById("consent").checked = false;
      previewWrap.style.display = "none";
      previewImage.src = "";
      fullNameInput.value = result.fullName || "";
    } else {
      status.innerText = result.message || "Upload failed.";
      status.style.color = "red";
    }

  } catch (err) {
    status.innerText = "Upload failed. Please try again.";
    status.style.color = "red";
    console.error(err);
  }

  button.disabled = false;
  button.innerText = "Submit Photo";
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
    reader.readAsDataURL(file);
  });
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

</script>

</body>
</html>
