<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Media Uploads | One Leyte</title>

<link rel="stylesheet" href="style.css">

<style>

.page-header{
text-align:center;
padding:70px 20px 40px 20px;
background:#08110c;
color:white;
}

.page-header h1{
font-size:34px;
margin-bottom:10px;
}

.page-header p{
max-width:700px;
margin:auto;
color:#cfd7d2;
}

.media-container{
padding:60px 20px;
background:#f4f4f4;
}

.media-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.media-card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.media-card img{
width:100%;
height:200px;
object-fit:cover;
}

.media-caption{
padding:15px;
font-size:14px;
color:#333;
}

.submit-section{
text-align:center;
padding:50px 20px;
background:white;
}

.submit-btn{
display:inline-block;
padding:14px 26px;
background:#0a6b3f;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

.submit-btn:hover{
background:#084c2c;
}

/* Upload Form */

.upload-form{
max-width:600px;
margin:40px auto;
text-align:left;
}

.upload-form input,
.upload-form textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
color:#111;
background:#fff;
box-sizing:border-box;
}

.upload-form input[type="file"]{
color:#111;
background:#fff;
}

.upload-form input[type="file"]::file-selector-button{
background:#0a6b3f;
color:#fff;
border:none;
padding:10px 14px;
border-radius:6px;
margin-right:12px;
cursor:pointer;
}

.upload-form input[type="file"]::file-selector-button:hover{
background:#084c2c;
}

.upload-form button{
padding:12px 20px;
background:#0a6b3f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.upload-form button:hover{
background:#084c2c;
}

.upload-form button:disabled{
background:#7aa892;
cursor:not-allowed;
}

.upload-status{
margin-top:15px;
font-weight:600;
color:#111;
min-height:24px;
}

.upload-form label{
display:block;
color:#333;
font-size:14px;
}

.upload-form input[type="checkbox"]{
width:auto;
margin-right:8px;
}

</style>

</head>

<body>

<section class="page-header">

<h1>Community Media</h1>

<p>
Photos and videos shared by members from events, gatherings,
and activities across the region.
</p>

</section>


<section class="media-container">

<div class="media-grid" id="mediaGrid">

Loading media...

</div>

</section>


<section class="submit-section">

<h3>Upload Media</h3>

<p>Members can upload photos and videos from activities.</p>

<br>

<a href="member-portal-access.html?next=media-upload-submit.html" class="submit-btn">
Upload Media
</a>

</section>


<section class="submit-section">

<h3>Submit Photo</h3>

<div class="upload-form">

<input type="text" id="fullName" placeholder="Full Name">

<input type="text" id="municipality" placeholder="Municipality">

<textarea id="caption" placeholder="Caption"></textarea>

<input type="file" id="photoFile" accept="image/*">

<label>
<input type="checkbox" id="consent">
I allow One Leyte for Sara Duterte to review and publish this photo if approved.
</label>

<br><br>

<button type="button" id="uploadBtn" onclick="uploadMedia()">Submit Photo</button>

<div id="uploadStatus" class="upload-status"></div>

</div>

</section>


<script>

const api = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec?action=media";

fetch(api)
.then(res => res.json())
.then(data => {

const container = document.getElementById("mediaGrid");
container.innerHTML = "";

if (!data.items || !data.items.length) {
  container.innerHTML = "<p style='text-align:center;'>No approved media yet.</p>";
  return;
}

data.items.forEach(item => {

const card = document.createElement("div");
card.className = "media-card";

card.innerHTML = `
<img src="${item.MediaURL}" alt="Community Media">
<div class="media-caption">
<strong>${item.FullName}</strong><br>
${item.Caption}
</div>
`;

container.appendChild(card);

});

})
.catch(() => {
  document.getElementById("mediaGrid").innerHTML = "<p style='text-align:center;'>Unable to load media right now.</p>";
});


async function uploadMedia(){

const status = document.getElementById("uploadStatus");
const button = document.getElementById("uploadBtn");

const fullName = document.getElementById("fullName").value.trim();
const municipality = document.getElementById("municipality").value.trim();
const caption = document.getElementById("caption").value.trim();
const consent = document.getElementById("consent").checked;
const file = document.getElementById("photoFile").files[0];

status.style.color = "#111";

if(!fullName || !municipality || !caption){
status.innerText = "Please fill all fields.";
status.style.color = "red";
return;
}

if(!file){
status.innerText = "Please choose a photo.";
status.style.color = "red";
return;
}

if(!consent){
status.innerText = "Please check the consent box.";
status.style.color = "red";
return;
}

if(!file.type.startsWith("image/")){
status.innerText = "Only image files are allowed.";
status.style.color = "red";
return;
}

button.disabled = true;
button.innerText = "Uploading...";
status.innerText = "Uploading...";
status.style.color = "#111";

try {

const base64 = await fileToBase64(file);

const payload = {
action: "uploadmedia",
fullName: fullName,
municipality: municipality,
caption: caption,
consent: "Yes",
fileName: file.name,
mimeType: file.type,
base64Data: base64
};

const response = await fetch("https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec", {
method: "POST",
headers: { "Content-Type": "text/plain;charset=utf-8" },
body: JSON.stringify(payload)
});

const result = await response.json();

if(result.success){
status.innerText = "Upload successful. Waiting for admin approval.";
status.style.color = "green";

document.getElementById("fullName").value = "";
document.getElementById("municipality").value = "";
document.getElementById("caption").value = "";
document.getElementById("photoFile").value = "";
document.getElementById("consent").checked = false;
} else {
status.innerText = result.message || "Upload failed.";
status.style.color = "red";
}

} catch(err){
status.innerText = "Upload failed. Please try again.";
status.style.color = "red";
}

button.disabled = false;
button.innerText = "Submit Photo";
}


function fileToBase64(file){
return new Promise((resolve, reject) => {
const reader = new FileReader();
reader.onload = () => resolve(reader.result);
reader.onerror = error => reject(error);
reader.readAsDataURL(file);
});
}

</script>

</body>
</html>
