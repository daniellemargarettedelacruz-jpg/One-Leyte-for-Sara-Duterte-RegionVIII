<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Uploads | One Leyte for Sara Duterte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8fafc;
      color: #1e293b;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .subtitle {
      color: #64748b;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    .media-box img,
    .media-box video {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }
    .content {
      padding: 16px;
    }
    .name {
      font-weight: bold;
      margin-bottom: 6px;
    }
    .place {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .caption {
      line-height: 1.6;
    }
    .loading, .empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Media Uploads</h1>
    <p class="subtitle">Approved photos and videos shared by members and supporters.</p>
    <div id="media-list" class="loading">Loading media uploads...</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec?action=media";

    async function loadMedia() {
      const container = document.getElementById("media-list");

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (!data.success || !data.items.length) {
          container.innerHTML = '<div class="empty">No approved media uploads yet.</div>';
          return;
        }

        container.innerHTML = `<div class="grid">${
          data.items.map(item => `
            <div class="card">
              <div class="media-box">
                ${String(item.MediaType).toLowerCase() === "video"
                  ? `<video controls src="${item.MediaURL}"></video>`
                  : `<img src="${item.MediaURL}" alt="${item.Caption || "Media upload"}">`
                }
              </div>
              <div class="content">
                <div class="name">${item.FullName || "Supporter"}</div>
                <div class="place">${item.Municipality || ""}</div>
                <div class="caption">${item.Caption || ""}</div>
              </div>
            </div>
          `).join("")
        }</div>`;

      } catch (error) {
        container.innerHTML = '<div class="empty">Failed to load media uploads.</div>';
        console.error(error);
      }
    }

    loadMedia();
  </script>
</body>
</html>
