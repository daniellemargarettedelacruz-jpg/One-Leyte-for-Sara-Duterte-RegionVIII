<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claim My Membership ID</title>

  <style>
    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f5f5f5;
      padding:40px 16px;
      text-align:center;
      margin:0;
    }

    .container{
      background:white;
      padding:30px;
      max-width:500px;
      margin:auto;
      border-radius:8px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    input{
      width:90%;
      padding:10px;
      margin:10px;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      padding:12px 25px;
      font-size:16px;
      background:#1c5fd4;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#1346a5;
    }

    button:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }

    .result{
      margin-top:20px;
      text-align:left;
    }

    .id-card{
      border:2px solid #1c5fd4;
      border-radius:10px;
      padding:20px;
      margin-top:20px;
      background:#fafafa;
      text-align:center;
    }

    .qr{
      margin-top:15px;
    }

    .qr img{
      max-width:180px;
      height:auto;
    }

    .helper{
      font-size:14px;
      color:#666;
      margin-top:8px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Claim Your Membership ID</h2>

    <p>Enter your Full Name and Municipality.</p>

    <input id="fullname" placeholder="Full Name" />
    <input id="municipality" placeholder="Municipality" />

    <br>

    <button type="button" id="searchBtn">Search</button>

    <div class="helper">
      Example: Juan Dela Cruz / Palo
    </div>

    <div class="result" id="result"></div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec";

    const fullNameInput = document.getElementById("fullname");
    const municipalityInput = document.getElementById("municipality");
    const searchBtn = document.getElementById("searchBtn");
    const resultBox = document.getElementById("result");

    searchBtn.addEventListener("click", searchMember);
    fullNameInput.addEventListener("keydown", function(e){
      if (e.key === "Enter") searchMember();
    });
    municipalityInput.addEventListener("keydown", function(e){
      if (e.key === "Enter") searchMember();
    });

    function cleanLookupText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function searchMember() {
      const name = cleanLookupText(fullNameInput.value);
      const municipality = cleanLookupText(municipalityInput.value);

      fullNameInput.value = name;
      municipalityInput.value = municipality;
      resultBox.innerHTML = "";

      if (!name || !municipality) {
        alert("Please enter Full Name and Municipality");
        return;
      }

      searchBtn.disabled = true;
      searchBtn.textContent = "Searching...";

      const url =
        API_URL +
        "?action=claimid&fullName=" +
        encodeURIComponent(name) +
        "&municipality=" +
        encodeURIComponent(municipality);

      fetch(url)
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            resultBox.innerHTML =
              "<p style='color:red'>" + escapeHtml(data.message || "Member not found.") + "</p>";
            return;
          }

          const memberId = data.memberId || "";
          const fullName = data.fullName || "";
          const muni = data.municipality || "";

          const qrCode =
            "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" +
            encodeURIComponent(memberId);

          resultBox.innerHTML = `
            <div class="id-card">
              <h3>One Leyte Digital Membership</h3>

              <p><b>Name:</b> ${escapeHtml(fullName)}</p>
              <p><b>Municipality:</b> ${escapeHtml(muni)}</p>
              <p><b>Member ID:</b> ${escapeHtml(memberId)}</p>

              <div class="qr">
                <img src="${qrCode}" alt="QR Code">
              </div>

              <p style="margin-top:12px;font-size:14px;">
                Use this QR code when posting on Freedom Wall or Media Uploads.
              </p>
            </div>
          `;
        })
        .catch(err => {
          console.error(err);
          resultBox.innerHTML =
            "<p style='color:red'>Server error. Please try again later.</p>";
        })
        .finally(() => {
          searchBtn.disabled = false;
          searchBtn.textContent = "Search";
        });
    }
  </script>

</body>
</html>
