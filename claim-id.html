<!DOCTYPE html>
<html>
<head>

<title>Claim My Membership ID</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
text-align:center;
}

.container{
background:white;
padding:30px;
max-width:500px;
margin:auto;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:12px 25px;
font-size:16px;
background:#1c5fd4;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1346a5;
}

.result{
margin-top:20px;
text-align:left;
}

.id-card{
border:2px solid #1c5fd4;
border-radius:10px;
padding:20px;
margin-top:20px;
background:#fafafa;
text-align:center;
}

.qr{
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Claim Your Membership ID</h2>

<p>Enter your Full Name and Municipality.</p>

<input id="fullname" placeholder="Full Name">

<input id="municipality" placeholder="Municipality">

<br>

<button onclick="searchMember()">Search</button>

<div class="result" id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec";

function searchMember(){

const name = document.getElementById("fullname").value;
const municipality = document.getElementById("municipality").value;

if(!name || !municipality){

alert("Please enter Full Name and Municipality");

return;

}

const url =
API_URL +
"?action=claimid&fullName=" +
encodeURIComponent(name) +
"&municipality=" +
encodeURIComponent(municipality);


fetch(url)
.then(res => res.json())
.then(data => {

if(!data.success){

document.getElementById("result").innerHTML =
"<p style='color:red'>" + data.message + "</p>";

return;

}

const memberId = data.memberId;
const fullName = data.fullName;
const muni = data.municipality;


/* Generate QR Code */

const qrCode =
"https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + memberId;


document.getElementById("result").innerHTML = `

<div class="id-card">

<h3>One Leyte Digital Membership</h3>

<p><b>Name:</b> ${fullName}</p>

<p><b>Municipality:</b> ${muni}</p>

<p><b>Member ID:</b> ${memberId}</p>

<div class="qr">

<img src="${qrCode}">

</div>

<p style="margin-top:12px;font-size:14px;">
Use this QR code when posting on Freedom Wall or Media Uploads.
</p>

</div>

`;

})

.catch(err => {

console.error(err);

document.getElementById("result").innerHTML =
"<p style='color:red'>Server error. Please try again later.</p>";

});

}

</script>

</body>
</html>
