<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements | One Leyte</title>

  <link rel="stylesheet" href="style.css">

  <style>
    .page-header {
      text-align: center;
      padding: 70px 20px 40px 20px;
      background: #08110c;
      color: white;
    }

    .page-header h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .page-header p {
      color: #cfd7d2;
      max-width: 700px;
      margin: auto;
    }

    .announcement-container {
      padding: 60px 20px;
      background: #f4f4f4;
    }

    .announcement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1100px;
      margin: auto;
    }

    .announcement-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      border-left: 4px solid #0a6b3f;
    }

    .announcement-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 12px;
      max-height: 260px;
      object-fit: cover;
    }

    .announcement-title {
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 8px;
      color: #0a6b3f;
      line-height: 1.3;
    }

    .announcement-meta {
      font-size: 13px;
      color: #777;
      margin-bottom: 10px;
    }

    .announcement-summary {
      font-size: 14px;
      color: #333;
      margin-bottom: 10px;
      font-weight: 600;
      line-height: 1.5;
    }

    .announcement-content {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .empty-message {
      text-align: center;
      color: #666;
      padding: 30px 20px;
      grid-column: 1 / -1;
    }
  </style>
</head>

<body>

  <section class="page-header">
    <h1>Announcements</h1>
    <p>
      Updates and important notices for members of One Leyte for Sara Duterte Region VIII.
      All announcements are reviewed before being displayed publicly.
    </p>
  </section>

  <section class="announcement-container">
    <div class="announcement-grid" id="announcementList">
      <div class="empty-message">Loading announcements...</div>
    </div>
  </section>

  <script>
    const api = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec?action=announcements";

    fetch(api)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("announcementList");
        container.innerHTML = "";

        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<div class="empty-message">No announcements available yet.</div>';
          return;
        }

        data.items.forEach(item => {
          const card = document.createElement("div");
          card.className = "announcement-card";

          const title = item.Title || "";
          const category = item.Category || "";
          const datePosted = item.DatePosted || "";
          const summary = item.Summary || "";
          const content = item.Content || "";
          const imageURL = item.ImageURL || "";

          card.innerHTML = `
            ${imageURL ? `<img src="${imageURL}" alt="${title}">` : ``}
            <div class="announcement-title">${title}</div>
            <div class="announcement-meta">${datePosted}${category ? ` • ${category}` : ``}</div>
            ${summary ? `<div class="announcement-summary">${summary}</div>` : ``}
            ${content ? `<div class="announcement-content">${content}</div>` : ``}
          `;

          container.appendChild(card);
        });
      })
      .catch(error => {
        const container = document.getElementById("announcementList");
        container.innerHTML = '<div class="empty-message">Unable to load announcements right now.</div>';
        console.error(error);
      });
  </script>

</body>
</html>
