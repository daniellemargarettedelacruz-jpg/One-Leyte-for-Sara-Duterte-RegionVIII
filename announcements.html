<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements | One Leyte</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    .page-header{
      text-align:center;
      padding:70px 20px 40px 20px;
      background:#08110c;
      color:white;
      position:relative;
    }

    .admin-access-wrap{
      position:absolute;
      top:20px;
      right:20px;
    }

    .admin-access-btn{
      display:inline-block;
      padding:10px 16px;
      background:#0a6b3f;
      color:#fff;
      text-decoration:none;
      border-radius:8px;
      font-size:14px;
      font-weight:600;
      box-shadow:0 4px 10px rgba(0,0,0,0.18);
      transition:0.2s ease;
    }

    .admin-access-btn:hover{
      background:#084f2e;
    }

    .page-header h1{
      font-size:34px;
      margin-bottom:10px;
    }

    .page-header p{
      color:#cfd7d2;
      max-width:700px;
      margin:auto;
    }

    .announcement-container{
      padding:60px 20px;
      background:#f4f4f4;
      min-height:280px;
    }

    .announcement-grid{
      max-width:1100px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .announcement-card{
      display:flex;
      gap:20px;
      background:white;
      border-radius:12px;
      padding:20px;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
      border-left:4px solid #0a6b3f;
      align-items:flex-start;
    }

    .announcement-image{
      width:240px;
      height:160px;
      border-radius:10px;
      object-fit:cover;
      flex-shrink:0;
      background:#e7ece8;
    }

    .announcement-body{
      flex:1;
    }

    .announcement-title{
      font-size:22px;
      font-weight:700;
      color:#0a6b3f;
      margin-bottom:6px;
    }

    .announcement-meta{
      font-size:13px;
      color:#777;
      margin-bottom:10px;
    }

    .announcement-summary{
      font-size:14px;
      margin-bottom:12px;
      font-weight:600;
      color:#1e1e1e;
      line-height:1.6;
    }

    .empty-message{
      text-align:center;
      background:#ffffff;
      padding:24px;
      border-radius:12px;
      box-shadow:0 6px 16px rgba(0,0,0,0.06);
      color:#555;
    }

    .read-btn{
      background:#0a6b3f;
      color:white;
      border:none;
      padding:8px 16px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    .read-btn:hover{
      background:#084f2e;
    }

    #announcementPopup{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px;
      box-sizing:border-box;
    }

    .popup-box{
      background:rgba(255,255,255,0.94);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      max-width:700px;
      width:90%;
      border-radius:12px;
      padding:25px;
      max-height:80vh;
      overflow:auto;
      box-shadow:0 20px 40px rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.4);
      color:#1f1f1f;
    }

    .popup-box h2{
      margin:0 0 10px 0;
      font-size:30px;
      font-weight:800;
      color:#0a6b3f;
      line-height:1.25;
    }

    #popupMeta{
      color:#555 !important;
      font-size:14px !important;
      margin-bottom:18px;
      line-height:1.5;
    }

    #popupContent{
      color:#222 !important;
      font-size:16px;
      line-height:1.8;
      white-space:pre-wrap;
    }

    .popup-close{
      margin-top:20px;
      padding:10px 18px;
      cursor:pointer;
      background:#0a6b3f;
      color:#fff;
      border:none;
      border-radius:8px;
      font-weight:600;
    }

    .popup-close:hover{
      background:#084f2e;
    }

    @media (max-width: 800px){
      .announcement-card{
        flex-direction:column;
      }

      .announcement-image{
        width:100%;
        height:220px;
      }

      .admin-access-wrap{
        position:static;
        margin-bottom:18px;
      }

      .page-header{
        padding-top:30px;
      }
    }
  </style>
</head>
<body>

 <section class="page-header">
  <div class="admin-access-wrap">
    <a class="admin-access-btn" href="admin-announcements.html">Admin Access</a>
  </div>

  <h1>Announcements</h1>
  <p>
    Updates and important notices for members of One Leyte for Sara Duterte Region VIII.
  </p>
</section>

  <section class="announcement-container">
    <div class="announcement-grid" id="announcementList">
      <div class="empty-message">Loading announcements...</div>
    </div>
  </section>

  <div id="announcementPopup">
    <div class="popup-box">
      <h2 id="popupTitle"></h2>
      <p id="popupMeta"></p>
      <div id="popupContent"></div>
      <button class="popup-close" onclick="closePopup()">Close</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec?action=announcements";

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeText(value) {
      return String(value || "").trim();
    }

    function buildMeta(datePosted, category, fullName) {
      const parts = [];
      if (datePosted) parts.push(datePosted);
      if (category) parts.push(category);
      if (fullName) parts.push(fullName);
      return parts.join(" • ");
    }

    async function loadAnnouncements() {
      const container = document.getElementById("announcementList");
      container.innerHTML = '<div class="empty-message">Loading announcements...</div>';

      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        container.innerHTML = "";

        if (!data.success) {
          container.innerHTML = '<div class="empty-message">Unable to load announcements right now.</div>';
          console.error("Announcements API error:", data);
          return;
        }

        if (!data.items || !Array.isArray(data.items) || data.items.length === 0) {
          container.innerHTML = '<div class="empty-message">No announcements available yet.</div>';
          return;
        }

        data.items.forEach(item => {
          const title = safeText(item.Title);
          const category = safeText(item.Category);
          const datePosted = safeText(item.DatePosted);
          const summary = safeText(item.Summary);
          const content = safeText(item.Content);
          const imageURL = safeText(item.ImageURL);
          const fullName = safeText(item.FullName);

          const card = document.createElement("div");
          card.className = "announcement-card";

          card.innerHTML = `
            ${imageURL ? `<img class="announcement-image" src="${escapeHtml(imageURL)}" alt="${escapeHtml(title)}">` : ``}
            <div class="announcement-body">
              <div class="announcement-title">${escapeHtml(title || "Untitled Announcement")}</div>
              <div class="announcement-meta">${escapeHtml(buildMeta(datePosted, category, fullName))}</div>
              ${summary ? `<div class="announcement-summary">${escapeHtml(summary)}</div>` : ``}
              <button class="read-btn" type="button">Read Full Announcement</button>
            </div>
          `;

          const btn = card.querySelector(".read-btn");
          btn.addEventListener("click", function () {
            openPopup(
              title || "Untitled Announcement",
              buildMeta(datePosted, category, fullName),
              content || summary || "No content available."
            );
          });

          container.appendChild(card);
        });

      } catch (error) {
        container.innerHTML = '<div class="empty-message">Unable to load announcements right now.</div>';
        console.error("Announcements fetch failed:", error);
      }
    }

    function openPopup(title, meta, content) {
      document.getElementById("popupTitle").innerText = title;
      document.getElementById("popupMeta").innerText = meta;
      document.getElementById("popupContent").innerText = content;
      document.getElementById("announcementPopup").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("announcementPopup").style.display = "none";
    }

    document.getElementById("announcementPopup").addEventListener("click", function(e) {
      if (e.target.id === "announcementPopup") {
        closePopup();
      }
    });

    loadAnnouncements();
  </script>

</body>
</html>
