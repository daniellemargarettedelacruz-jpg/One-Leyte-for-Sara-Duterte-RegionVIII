<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements | One Leyte for Sara Duterte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    h1 {
      margin-bottom: 10px;
      color: #102118;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border-left: 5px solid #d4af37;
    }

    .card img {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .meta {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #102118;
      line-height: 1.25;
    }

    .summary {
      font-size: 16px;
      color: #444;
      margin-bottom: 16px;
      line-height: 1.6;
      font-weight: 600;
    }

    .read-btn {
      display: inline-block;
      padding: 10px 16px;
      background: #0a6b3f;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .read-btn:hover {
      background: #084c2c;
    }

    .content-box {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e6e6e6;
      white-space: pre-wrap;
      line-height: 1.7;
      color: #333;
      display: none;
    }

    .loading,
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px 16px 50px;
      }

      .title {
        font-size: 22px;
      }

      .summary {
        font-size: 15px;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Official Announcements</h1>
    <p class="subtitle">
      Updates, advisories, statements, and official notices from One Leyte for Sara Duterte Region VIII.
    </p>

    <div id="announcements-list" class="loading">Loading announcements...</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec?action=announcements";

    async function loadAnnouncements() {
      const container = document.getElementById("announcements-list");

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (!data.success || !data.items || !data.items.length) {
          container.innerHTML = '<div class="empty">No announcements available yet.</div>';
          return;
        }

        container.innerHTML = data.items.map((item, index) => {
          const title = item.Title || "";
          const category = item.Category || "";
          const summary = item.Summary || "";
          const content = item.Content || "";
          const imageURL = item.ImageURL || "";
          const datePosted = item.DatePosted || "";

          return `
            <div class="card">
              ${imageURL ? `<img src="${imageURL}" alt="${title || 'Announcement'}">` : ""}

              <div class="meta">
                ${datePosted}${category ? ` • ${category}` : ""}
              </div>

              <div class="title">${title}</div>

              ${summary ? `<div class="summary">${summary}</div>` : ""}

              ${content ? `
                <button class="read-btn" onclick="toggleContent('content-${index}', this)">
                  Read Full Announcement
                </button>
                <div class="content-box" id="content-${index}">${content}</div>
              ` : ""}
            </div>
          `;
        }).join("");

      } catch (error) {
        container.innerHTML = '<div class="empty">Failed to load announcements.</div>';
        console.error(error);
      }
    }

    function toggleContent(id, btn) {
      const box = document.getElementById(id);

      if (box.style.display === "block") {
        box.style.display = "none";
        btn.textContent = "Read Full Announcement";
      } else {
        box.style.display = "block";
        btn.textContent = "Hide Full Announcement";
      }
    }

    loadAnnouncements();
  </script>
</body>
</html>
