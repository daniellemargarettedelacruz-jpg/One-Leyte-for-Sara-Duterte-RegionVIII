<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements | One Leyte for Sara Duterte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .card img {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .meta {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .summary {
      font-size: 16px;
      color: #444;
      margin-bottom: 10px;
    }
    .content {
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .loading, .empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Official Announcements</h1>
    <p class="subtitle">Updates, advisories, statements, and official notices from One Leyte for Sara Duterte Region VIII.</p>
    <div id="announcements-list" class="loading">Loading announcements...</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzu4Xq8qr-paVOe8SE8V7FRDiZp-opYnDpcVWuGS755DskMklEj-YMQ8BI05cauIIfz/exec?action=announcements";

    async function loadAnnouncements() {
      const container = document.getElementById("announcements-list");

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        if (!data.success || !data.items.length) {
          container.innerHTML = '<div class="empty">No announcements available yet.</div>';
          return;
        }

        container.innerHTML = data.items.map(item => `
  <div class="card">
    ${item.ImageURL ? `<img src="${item.ImageURL}" alt="${item.Title}">` : ""}

    <div class="meta">
      ${item.DatePosted || ""} ${item.Category ? "• " + item.Category : ""}
    </div>

    <div class="title">
      ${item.Title || ""}
    </div>

    ${item.Summary ? `<div class="summary">${item.Summary}</div>` : ""}

    ${item.Content ? `<div class="content">${item.Content}</div>` : ""}

  </div>
`).join("");

    loadAnnouncements();
  </script>
</body>
</html>
