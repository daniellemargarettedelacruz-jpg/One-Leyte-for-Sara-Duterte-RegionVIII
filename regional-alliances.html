<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Regional Alliances | One Leyte</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f4f6f5;
      color:#102118;
    }

    .page{
      padding:50px 20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
    }

    .sub{
      text-align:center;
      margin-bottom:40px;
      color:#5d6b60;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#fff;
      border-radius:16px;
      padding:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      text-align:center;
    }

    .img-wrap{
      height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f1f3f2;
      border-radius:12px;
      margin-bottom:12px;
      overflow:hidden;
    }

    .img-wrap img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }

    .name{
      font-weight:700;
      margin-bottom:4px;
    }

    .loc{
      font-size:14px;
      color:#6a776e;
    }

    .empty{
      text-align:center;
      padding:30px;
      background:#fff;
      border-radius:16px;
    }

    .back{
      display:inline-block;
      margin-bottom:20px;
      text-decoration:none;
      background:#0a6b3f;
      color:#fff;
      padding:10px 16px;
      border-radius:10px;
      font-weight:600;
    }
  </style>
</head>
<body>

<section class="page">
  <div class="container">

    <a href="index.html" class="back">
      ← Back to Home
    </a>

    <h1>Regional Alliances</h1>
    <p class="sub">Alliance logos and banners across Region VIII</p>

    <div id="grid" class="grid"></div>

  </div>
</section>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_iBQBrRpni8W1sJVRYDFoMn_MkPNHumyv0JvzBOrXRMQE4Pe1k5GJQM9FE9WP4qN5/exec";

async function loadAlliances(){
  const grid = document.getElementById("grid");

  try{
    const res = await fetch(`${WEB_APP_URL}?action=alliances`);
    const data = await res.json();

    const items = data.items || [];

    grid.innerHTML = "";

    if(!items.length){
      grid.innerHTML = `<div class="empty">No alliances uploaded yet.</div>`;
      return;
    }

    items.forEach(item=>{
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="img-wrap">
          <img src="${item.fileUrl || ""}">
        </div>
        <div class="name">${item.allianceName || ""}</div>
        <div class="loc">${item.location || ""}</div>
      `;

      grid.appendChild(card);
    });

  }catch(err){
    console.error(err);
    grid.innerHTML = `<div class="empty">Failed to load alliances.</div>`;
  }
}

loadAlliances();
</script>

</body>
</html>
